<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucătăria Virtuală</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="title">
    <h1>
        Bucătăria<br>
        <span class="sub">Virtuală</span>
    </h1>
</div>

    <div class="content">
    <button onclick="openModal('modal-main')">Feluri principale</button>
    <button onclick="openModal('modal-dessert')">Deserturi</button>
    </div>
    <!-- MODAL FELURI PRINCIPALE -->
<div id="modal-main" class="modal hidden">
    <div class="modal-content">
        
        <button class="close-btn" onclick="closeModal('modal-main')">
            <div class="X"></div>
            <div class="Y"></div>
        </button>

        <h2>Feluri principale</h2>

<div class="recipes">

    <div class="card" onclick="toggleCard(this)">
    <h3>Paste Carbonara</h3>
    <p>Paste, ouă, bacon, parmezan</p>

    <div class="more">
        <p><b>Rețetă:</b></p>
        <p>1. Fierbe pastele</p>
        <p>2. Prăjește baconul</p>
        <p>3. Amestecă cu ou și parmezan</p>
    </div>
</div>

</div>

    </div>
</div>

<!-- MODAL DESERTURI -->
<div id="modal-dessert" class="modal hidden">
    <div class="modal-content">
        
        <button class="close-btn" onclick="closeModal('modal-dessert')">
            <div class="X"></div>
            <div class="Y"></div>
        </button>

        <h2>Deserturi</h2>
        <p>Aici vei pune deserturile 🍰</p>

    </div>
</div>

    <canvas id="experience-canvas"></canvas>

    <script type="module" src="script3d.js"></script>

</body>
</html>
